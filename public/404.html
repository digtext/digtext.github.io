<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Dig.txt</title>
    <script>
      // Redirect all 404s to index.html for SPA client-side routing
      // GitHub Pages serves this file for any path that doesn't match a real file
      var pathSegmentsToKeep = 1; // keep '/digtext' prefix
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
